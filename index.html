<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motocred — Investor Deck</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏍️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #080c16; color: #e2e8f0; overflow: hidden; height: 100vh; width: 100vw; }
  
  .app { display: flex; flex-direction: column; height: 100vh; }
  
  /* Progress */
  .progress-bar { height: 3px; background: #141d2e; flex-shrink: 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #F57C20, #ff9a44); transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  
  /* Main layout */
  .main { flex: 1; display: flex; overflow: hidden; position: relative; }
  
  /* Slide area */
  .slide-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .slide-viewport { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
  .slide-frame { width: 100%; max-width: 960px; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6); position: relative; background: #0f1729; }
  .slide-frame img { width: 100%; height: 100%; object-fit: contain; display: block; user-select: none; -webkit-user-drag: none; }
  
  /* Slide transition */
  .slide-frame img { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  
  /* Click zones for navigation */
  .nav-zone { position: absolute; top: 0; bottom: 0; width: 15%; cursor: pointer; z-index: 5; display: flex; align-items: center; transition: background 0.15s; }
  .nav-zone:hover { background: rgba(255,255,255,0.02); }
  .nav-zone.left { left: 0; justify-content: flex-start; padding-left: 12px; }
  .nav-zone.right { right: 0; justify-content: flex-end; padding-right: 12px; }
  .nav-zone .arrow { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: 0; transition: opacity 0.2s; }
  .nav-zone:hover .arrow { opacity: 1; }
  .nav-zone.disabled { pointer-events: none; }
  .nav-zone.disabled .arrow { display: none; }
  
  /* Bottom bar */
  .bottom-bar { padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-top: 1px solid #141d2e; }
  .slide-counter { display: flex; align-items: center; gap: 10px; }
  .counter-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #1e293b; background: transparent; color: #64748b; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
  .counter-btn:hover:not(:disabled) { border-color: #F57C20; color: #F57C20; }
  .counter-btn:disabled { opacity: 0.3; cursor: default; }
  .counter-label { padding: 5px 14px; border-radius: 8px; border: 1px solid #1e293b; background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; transition: all 0.15s; }
  .counter-label:hover { border-color: #334155; color: #cbd5e1; }
  
  .chat-toggle { padding: 9px 20px; border-radius: 24px; border: none; background: linear-gradient(135deg, #F57C20, #e06610); color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 24px rgba(245,124,32,0.25); transition: all 0.2s; }
  .chat-toggle:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(245,124,32,0.35); }
  .chat-toggle.active { background: #1e293b; box-shadow: none; }
  .chat-toggle.active:hover { background: #334155; transform: none; }
  
  /* Thumbnails */
  .thumbnails { position: absolute; bottom: 52px; left: 0; right: 0; background: rgba(8,12,22,0.96); backdrop-filter: blur(12px); border-top: 1px solid #1e293b; padding: 14px 20px; display: flex; gap: 8px; overflow-x: auto; z-index: 20; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .thumb { flex-shrink: 0; width: 120px; height: 68px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; opacity: 0.5; transition: all 0.2s; position: relative; }
  .thumb:hover { opacity: 0.8; border-color: #334155; }
  .thumb.active { opacity: 1; border-color: #F57C20; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-num { position: absolute; bottom: 3px; left: 5px; font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  
  /* Chat panel */
  .chat-panel { width: 380px; border-left: 1px solid #1e293b; display: flex; flex-direction: column; background: #0b1018; flex-shrink: 0; animation: chatSlideIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes chatSlideIn { from { width: 0; opacity: 0; } to { width: 380px; opacity: 1; } }
  
  .chat-header { padding: 14px 18px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chat-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #F57C20, #c2590f); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .chat-title { color: #fff; font-size: 14px; font-weight: 600; }
  .chat-status { color: #22c55e; font-size: 11px; }
  
  .chat-messages { flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: #F57C20; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: #1a2335; color: #e2e8f0; border-bottom-left-radius: 4px; }
  .msg-loading .msg-bubble { color: #64748b; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .loading-dots { animation: pulse 1.4s infinite; }
  
  .suggestions { padding: 0 14px 8px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .suggestion { padding: 8px 12px; border-radius: 10px; border: 1px solid #1e293b; background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px; font-family: inherit; text-align: left; transition: all 0.15s; }
  .suggestion:hover { border-color: #F57C20; color: #F57C20; }
  
  .chat-input-area { padding: 10px 14px; border-top: 1px solid #1e293b; flex-shrink: 0; }
  .chat-input-row { display: flex; gap: 8px; align-items: center; }
  .chat-input { flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid #1e293b; background: #0f1520; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .chat-input:focus { border-color: #F57C20; }
  .chat-input::placeholder { color: #475569; }
  .send-btn { width: 38px; height: 38px; border-radius: 10px; border: none; background: #1e293b; color: #64748b; cursor: default; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; }
  .send-btn.active { background: #F57C20; color: #fff; cursor: pointer; }
  .send-btn.active:hover { background: #e06610; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #334155; }
  
  /* Mobile */
  @media (max-width: 768px) {
    .chat-panel { width: 100%; position: absolute; top: 0; right: 0; bottom: 0; z-index: 50; }
    @keyframes chatSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .thumb { width: 90px; height: 51px; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="main">
    <div class="slide-area">
      <div class="slide-viewport">
        <div class="slide-frame">
          <img id="slideImg" alt="Slide">
          <div class="nav-zone left" id="navLeft" onclick="prevSlide()"><div class="arrow">‹</div></div>
          <div class="nav-zone right" id="navRight" onclick="nextSlide()"><div class="arrow">›</div></div>
        </div>
      </div>
      <div class="bottom-bar">
        <div class="slide-counter">
          <button class="counter-btn" id="prevBtn" onclick="prevSlide()">‹</button>
          <button class="counter-label" id="counterLabel" onclick="toggleThumbs()"></button>
          <button class="counter-btn" id="nextBtn" onclick="nextSlide()">›</button>
        </div>
        <button class="chat-toggle" id="chatToggle" onclick="toggleChat()">
          <span id="chatIcon">💬</span>
          <span id="chatLabel">Ask AI about this deck</span>
        </button>
      </div>
      <div class="thumbnails" id="thumbnails" style="display:none;"></div>
    </div>
    <div class="chat-panel" id="chatPanel" style="display:none;">
      <div class="chat-header">
        <div class="chat-avatar">🏍️</div>
        <div><div class="chat-title">Motocred AI</div><div class="chat-status">● Online</div></div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="suggestions" id="suggestions"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" placeholder="Ask about Motocred..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

let currentSlide = 0;
let chatOpen = false;
let thumbsOpen = false;
let messages = [{ role: "assistant", content: "Hi! I'm Motocred's AI assistant. Ask me anything about the company, market, traction, team, or investment thesis. I'm here to help you dig deeper into any slide." }];
let isLoading = false;

function updateSlide() {
  const img = document.getElementById('slideImg');
  img.src = SLIDE_IMAGES[currentSlide];
  document.getElementById('progress').style.width = ((currentSlide + 1) / SLIDE_IMAGES.length * 100) + '%';
  document.getElementById('counterLabel').textContent = (currentSlide + 1) + ' / ' + SLIDE_IMAGES.length + '  ·  ' + SLIDE_TITLES[currentSlide];
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === SLIDE_IMAGES.length - 1;
  document.getElementById('navLeft').className = 'nav-zone left' + (currentSlide === 0 ? ' disabled' : '');
  document.getElementById('navRight').className = 'nav-zone right' + (currentSlide === SLIDE_IMAGES.length - 1 ? ' disabled' : '');
  // Update active thumb
  document.querySelectorAll('.thumb').forEach((t, i) => t.className = 'thumb' + (i === currentSlide ? ' active' : ''));
}

function nextSlide() { if (currentSlide < SLIDE_IMAGES.length - 1) { currentSlide++; updateSlide(); } }
function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }
function goToSlide(i) { currentSlide = i; updateSlide(); thumbsOpen = false; document.getElementById('thumbnails').style.display = 'none'; }

function toggleThumbs() {
  thumbsOpen = !thumbsOpen;
  document.getElementById('thumbnails').style.display = thumbsOpen ? 'flex' : 'none';
}

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').style.display = chatOpen ? 'flex' : 'none';
  document.getElementById('chatIcon').textContent = chatOpen ? '✕' : '💬';
  document.getElementById('chatLabel').textContent = chatOpen ? 'Close chat' : 'Ask AI about this deck';
  document.getElementById('chatToggle').className = 'chat-toggle' + (chatOpen ? ' active' : '');
  if (chatOpen) {
    renderMessages();
    document.getElementById('chatInput').focus();
  }
}

function renderMessages() {
  const container = document.getElementById('chatMessages');
  container.innerHTML = messages.map(m =>
    '<div class="msg ' + m.role + '"><div class="msg-bubble">' + escapeHtml(m.content) + '</div></div>'
  ).join('') + (isLoading ? '<div class="msg assistant msg-loading"><div class="msg-bubble"><span class="loading-dots">Thinking...</span></div></div>' : '');
  container.scrollTop = container.scrollHeight;
  
  // Suggestions
  const sug = document.getElementById('suggestions');
  if (messages.length <= 2 && !isLoading) {
    sug.innerHTML = [
      "What's the delinquency rate vs industry average?",
      "How does the AI underwriting work?",
      "What's the path to ecosystem lock-in?",
    ].map(q => '<button class="suggestion" onclick="setInput(this.textContent)">' + q + '</button>').join('');
  } else {
    sug.innerHTML = '';
  }
  
  // Send button state
  const hasText = document.getElementById('chatInput').value.trim().length > 0;
  document.getElementById('sendBtn').className = 'send-btn' + (hasText ? ' active' : '');
}

function setInput(text) {
  document.getElementById('chatInput').value = text;
  document.getElementById('sendBtn').className = 'send-btn active';
  document.getElementById('chatInput').focus();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('chatInput').addEventListener('input', function() {
  document.getElementById('sendBtn').className = 'send-btn' + (this.value.trim() ? ' active' : '');
});

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  
  input.value = '';
  messages.push({ role: "user", content: text });
  isLoading = true;
  renderMessages();
  
  try {
    const contextNote = 'The investor is currently viewing slide ' + (currentSlide+1) + ': "' + SLIDE_TITLES[currentSlide] + '" — ' + SLIDE_SUBTITLES[currentSlide];
    const apiMessages = messages.filter((m,i) => !(m.role === 'assistant' && i === 0)).map(m => ({ role: m.role, content: m.content }));
    
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: MOTOCRED_CONTEXT + "\n\n" + contextNote,
        messages: apiMessages,
      }),
    });
    const data = await response.json();
    const reply = data.content?.map(c => c.text || '').join('') || 'Sorry, I couldn\'t process that. Please try again.';
    messages.push({ role: "assistant", content: reply });
  } catch (err) {
    messages.push({ role: "assistant", content: "Connection error. Please try again." });
  }
  isLoading = false;
  renderMessages();
}

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextSlide(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
});

// Build thumbnails
const thumbsContainer = document.getElementById('thumbnails');
SLIDE_IMAGES.forEach((src, i) => {
  thumbsContainer.innerHTML += '<div class="thumb' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')"><img src="' + src + '" alt="Slide ' + (i+1) + '"><div class="thumb-num">' + (i+1) + '</div></div>';
});

// Init
updateSlide();
renderMessages();
</script>
</body>
</html>
